<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>任务逾期提醒</title>
</head>
<body style="font-family: 'Microsoft YaHei', Arial, sans-serif; margin: 0; padding: 20px; background-color: #f5f5f5;">
    <div style="max-width: 600px; margin: 0 auto; background: white; border-radius: 8px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-top: 4px solid #F56C6C;">
        <div style="border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 20px;">
            <h2 style="color: #F56C6C; margin: 0;">⚠️ 任务逾期提醒</h2>
        </div>

        <p style="color: #555; font-size: 14px;">
            您好 <strong>{{ assignee.username }}</strong>，以下任务已逾期，请尽快处理：
        </p>

        <div style="background: #fff8f8; border: 1px solid #fce4ec; border-radius: 6px; padding: 20px; margin: 20px 0;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <span style="font-size: 16px; font-weight: bold; color: #333;">{{ task.task_no }}</span>
                <span style="background: #F56C6C; color: white; padding: 2px 10px; border-radius: 12px; font-size: 12px;">已逾期</span>
            </div>
            <h3 style="color: #333; margin: 10px 0;">{{ task.title }}</h3>
            <div style="color: #666; font-size: 13px;">
                <p style="margin: 5px 0;">优先级: <strong>{{ task.get_priority_display }}</strong></p>
                <p style="margin: 5px 0;">截止日期: <strong style="color: #F56C6C;">{{ task.deadline|date:"Y-m-d H:i" }}</strong></p>
                <p style="margin: 5px 0;">当前进度: <strong>{{ task.progress }}%</strong></p>
            </div>
        </div>

        <p style="color: #F56C6C; font-size: 14px; font-weight: bold;">
            请尽快登录系统更新任务状态或联系相关负责人。
        </p>

        <div style="margin-top: 25px; padding-top: 15px; border-top: 1px solid #e9ecef; color: #999; font-size: 12px;">
            此邮件由系统自动发送，请勿直接回复。
        </div>
    </div>
</body>
</html>
