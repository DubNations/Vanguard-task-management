# ============================================================
# 种子团队任务管理系统 — 开发环境 Docker Compose
# 用法: docker compose -f deploy/docker-compose.dev.yml up -d
# 仅启动 PostgreSQL，后端和前端在本地运行
# ============================================================
version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: seedteam-dev-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: seedteam_dev
      POSTGRES_USER: seedteam
      POSTGRES_PASSWORD: seedteam_dev
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seedteam"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
    driver: local
